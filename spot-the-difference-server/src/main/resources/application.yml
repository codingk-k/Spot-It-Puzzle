server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/spot_the_diff?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 3000ms
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

jwt:
  secret: spot-the-diff-game-jwt-secret-key-2024
  access-token-expiration: 7200000
  refresh-token-expiration: 604800000

file:
  upload-dir: ./uploads

logging:
  level:
    com.game.spotthediff: DEBUG
